name: CodeQL

# GitHub's built-in static analysis for security bugs. Runs on every push to
# main, on PRs into main, and weekly on a schedule so advisories against
# upstream CodeQL rules catch us even when the repo is idle.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Monday 07:00 UTC — before the work week starts.
    - cron: "0 7 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
          # CodeQL's Rust extractor (in beta at the time of writing) only
          # supports `build-mode: none` — it discovers the crate graph via
          # cargo metadata rather than observing a real build. Attempting
          # `manual` here is a hard error: "Rust does not support the
          # manual build mode." We don't need to run `cargo build` at all;
          # the extractor handles everything from the source tree.
          - language: rust
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        # v4 — v3 is deprecated December 2026.
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Use the extended security + quality rule set for stricter
          # coverage than the default. This surfaces dead-code smells and
          # style issues in addition to security findings.
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
