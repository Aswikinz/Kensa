name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            vscode_target: linux-x64
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            vscode_target: linux-arm64
          - host: macos-latest
            target: x86_64-apple-darwin
            vscode_target: darwin-x64
          - host: macos-latest
            target: aarch64-apple-darwin
            vscode_target: darwin-arm64
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            vscode_target: win32-x64
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            vscode_target: win32-arm64

    name: ${{ matrix.vscode_target }}
    runs-on: ${{ matrix.host }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux cross-compile deps
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install npm deps
        run: npm ci || npm install

      - name: Build Rust native module
        run: npx napi build --platform --release --target ${{ matrix.target }} --cargo-cwd crates/kensa-engine --js index.js --dts index.d.ts crates/kensa-engine

      - name: Build extension + webview
        run: npm run build:ts

      - name: Run Rust tests
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'x86_64-apple-darwin' || matrix.target == 'x86_64-pc-windows-msvc'
        run: cargo test --manifest-path crates/kensa-engine/Cargo.toml

      - name: Run TS tests
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: npm test

      - name: Package VSIX
        run: npx vsce package --target ${{ matrix.vscode_target }} --out "kensa-${{ matrix.vscode_target }}.vsix"

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: kensa-${{ matrix.vscode_target }}
          path: kensa-${{ matrix.vscode_target }}.vsix
          if-no-files-found: error
