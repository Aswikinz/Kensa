# Automated dependency + security updates for Kensa.
#
# One weekly PR per ecosystem that rolls every non-breaking bump into a
# single group, plus one aggregated PR per ecosystem for major bumps so
# the review queue doesn't explode on the first run. Security advisories
# always open as individual PRs outside this cadence — that's by design
# and can't be grouped.
#
# Tuning rationale: the first Dependabot run after adding this config
# tends to open ~1 PR per out-of-date dep. We cap open PRs per ecosystem
# low and group aggressively so reviewing a week of bumps is one merge
# per ecosystem, not fifteen.

version: 2
updates:
  # TypeScript / React extension + webview
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "npm"
      include: "scope"
    groups:
      # One PR for every non-breaking bump.
      npm-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      # A separate PR for major bumps so they're still visible but don't
      # fan out to N individual PRs. Review these carefully — majors
      # usually have breaking changes.
      npm-major:
        applies-to: version-updates
        update-types:
          - "major"

  # Rust native data engine
  - package-ecosystem: "cargo"
    directory: "/crates/kensa-engine"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "cargo"
      include: "scope"
    groups:
      cargo-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      cargo-major:
        applies-to: version-updates
        update-types:
          - "major"

  # GitHub Actions workflow versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
    groups:
      actions-all:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
          - "major"
